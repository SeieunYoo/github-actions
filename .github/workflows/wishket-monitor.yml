name: 위시켓 프론트엔드 모니터링

on:
  schedule:
    - cron: '0 2 * * *'   # 매일 02:00 UTC = 11:00 KST
  workflow_dispatch:        # 수동 실행 가능

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: 패키지 설치
        run: |
          pip install requests beautifulsoup4 lzstring || \
          pip install --break-system-packages requests beautifulsoup4 lzstring

      - name: 위시켓 수집
        run: python3 scripts/wishket_frontend_monitor.py

      - name: 이슈에 결과 기록
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python3 scripts/wishket_issue_reporter.py
