name: Apply to Approved Jobs

# 이슈에 'ready-to-apply' 라벨이 붙으면, 본문에서 체크된 공고에 대해
# 간편지원을 자동 제출한다. 자소서가 필요한 공고는 코멘트로 안내만 한다.
#
# 주의: issues 이벤트로 트리거되는 워크플로우는 "기본 브랜치(main)"의
# 워크플로우 파일만 실행된다. 따라서 이 파일이 main 에 머지된 후에야 동작한다.

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  apply:
    if: github.event.label.name == 'ready-to-apply'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Apply to checked jobs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WANTED_STORAGE_STATE: ${{ secrets.WANTED_STORAGE_STATE }}
          JUMPIT_STORAGE_STATE: ${{ secrets.JUMPIT_STORAGE_STATE }}
        run: python scripts/apply.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apply-screenshots
          path: apply-screenshots/
          if-no-files-found: ignore

      - name: Commit applied state
        run: |
          if [[ -n "$(git status --porcelain state/applied.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/applied.json
            git commit -m "chore(job-apply): update applied state"
            git push
          else
            echo "no state changes"
          fi
